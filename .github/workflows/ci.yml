# ==========================================================
# GitHub Actions CI/CD Pipeline
# This workflow performs the following steps:
# 1. Runs automated tests for the FastAPI backend
# 2. Builds a Docker image
# 3. Pushes the image to Docker Hub
# 4. Deploys the application to an EC2 server
# ==========================================================

name: Devops CI Pipeline

# ==========================================================
# Trigger Conditions
# Pipeline runs on:
# 1. Every push to the main branch
# 2. Every pull request targeting the main branch
# ==========================================================

on:
  push:
    branches:
      - main
  
  pull_request:
    branches:
      - main

jobs:

# ==========================================================
# JOB 1 — TEST
# Runs automated tests before building the Docker image.
# This ensures broken code is never deployed.
# ==========================================================

  test:

    # GitHub will create a temporary Linux runner
    runs-on: ubuntu-latest
    
    steps:
    
    # ------------------------------------------------------
    # Step 1: Checkout the repository code
    # Downloads project files into the CI runner
    # ------------------------------------------------------

    - name: Checkout Code
      uses: actions/checkout@v4
    
    # ------------------------------------------------------
    # Step 2: Setup Python runtime
    # Installs Python 3.10 for running the backend tests
    # ------------------------------------------------------

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    # ------------------------------------------------------
    # Step 3: Install Python dependencies
    # Installs FastAPI and other backend libraries
    # ------------------------------------------------------

    - name: Install Dependencies
      run: |
        pip install -r backend/requirements.txt
    
    # ------------------------------------------------------
    # Step 4: Run automated tests using pytest
    # Uses a temporary SQLite database for testing
    # ------------------------------------------------------

    - name: Run Tests
      env:
        DATABASE_URL: sqlite:///./test.db
      run: |
        PYTHONPATH=. pytest


# ==========================================================
# JOB 2 — BUILD
# Builds and pushes the Docker image after tests pass.
# This job depends on the test job.
# ==========================================================

  build:

    runs-on: ubuntu-latest

    # Ensures build runs only if tests succeed
    needs: test

    steps:

    # ------------------------------------------------------
    # Step 1: Checkout repository again
    # Each job runs on a new runner, so we need to pull code
    # ------------------------------------------------------

    - name: Checkout Repository
      uses: actions/checkout@v4

    # ------------------------------------------------------
    # Step 2: Login to Docker Hub
    # Uses GitHub secrets for secure authentication
    # ------------------------------------------------------

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.nitesh232003 }}
        password: ${{ secrets.niteshpassword }}
    
    # ------------------------------------------------------
    # Step 3: Get the current commit SHA
    # Used to create unique Docker image tags
    # ------------------------------------------------------

    - name: Get commit SHA
      id: vars
      run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    
    # ------------------------------------------------------
    # Step 4: Build Docker image
    # Two tags are created:
    # 1. latest → for production deployment
    # 2. sha-<commit> → version tracking
    # ------------------------------------------------------

    - name: Build Docker Image
      run: |
       docker build \
       -t niteshsingla232003/devops-api:latest \
       -t niteshsingla232003/devops-api:sha-${{ steps.vars.outputs.sha }} \
        backend

    # ------------------------------------------------------
    # Step 5: Push Docker images to Docker Hub registry
    # ------------------------------------------------------

    - name: Push Docker Image
      run: |
        docker push niteshsingla232003/devops-api:latest
        docker push niteshsingla232003/devops-api:sha-${{ steps.vars.outputs.sha }}
    
  
# ==========================================================
# JOB 3 — DEPLOY
# Deploys the application to the EC2 server.
# This job runs only after the build job completes.
# ==========================================================

  deploy:

    runs-on: ubuntu-latest
    needs: build

    steps:

      # ------------------------------------------------------
      # Step 1: Connect to EC2 via SSH
      # appleboy SSH action runs commands remotely
      # ------------------------------------------------------

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:

          # EC2 public IP stored as GitHub secret
          host: ${{ secrets.EC2_HOST }}

          # Default Ubuntu username
          username: ubuntu

          # SSH private key stored securely in GitHub secrets
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          passphrase: ${{ secrets.SSH_PASSPHRASE }}

          # --------------------------------------------------
          # Commands executed on the EC2 server
          # --------------------------------------------------

          script: |

            # Clone repository if it doesn't exist on server
            
            if [ ! -d "/home/ubuntu/cloud-native-devops-platform" ]; then
                git clone https://github.com/NiteshSingla123/cloud-native-devops-platform.git /home/ubuntu/cloud-native-devops-platform
            fi

              # Navigate into project directory
              cd /home/ubuntu/cloud-native-devops-platform

              # Pull latest changes from GitHub
              git pull origin main

             

              echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" > .env
              echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
              echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env

              docker-compose down
              docker-compose pull
              docker-compose up -d