name: Devops CI Pipeline

on:
  push:
    branches:
      - main
  
  pull_request:
    branches:
      - main

jobs:

  test:

    runs-on: ubuntu-latest
    
    steps:
    
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Install Dependencies
      run: |
        pip install -r backend/requirements.txt
    
    - name: Run Tests
      run: |
        pytest

  build:

    runs-on: ubuntu-latest
    needs: test

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.nitesh232003 }}
        password: ${{ secrets.niteshpassword }}
    
    - name: Get commit SHA
      id: vars
      run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    
    - name: Build Docker Image
      run: |
        docker build -t niteshsingla232003/devops-api:latest \
        -t niteshsingla232003/devops-api:sha-${{ steps.vars.outputs.sha }} .

    - name: Push Docker Image
      run: |
        docker push niteshsingla232003/devops-api:latest
        docker push niteshsingla232003/devops-api:sha-${{ steps.vars.outputs.sha }}
    
