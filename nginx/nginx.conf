server { 
    # Defines a server block. 
    # A server block tells NGINX how to handle incoming requests for a specific domain/port.

    listen 80;
    # NGINX listens for incoming HTTP requests on port 80.
    # Port 80 is the default port for HTTP traffic.

    location / {
        # The location block defines how requests for a specific URI path are handled.
        # "/" means this rule applies to ALL requests to the server.

        proxy_pass http://backend:8000;
        # Forward (proxy) the incoming request to another server.
        # Here it sends the request to a service named "backend" on port 8000.
        # Often used in Docker, microservices, or when NGINX is acting as a reverse proxy.

        proxy_set_header Host $host;
        # Sends the original Host header from the client request to the backend server.
        # This helps the backend know which domain the request was made for.

        proxy_set_header X-Real-IP $remote_addr;
        # Sends the real client IP address to the backend.
        # Without this, the backend would only see the IP of the NGINX server.
    }
}